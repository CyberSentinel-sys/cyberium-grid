global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: orhashield
    environment: dev

scrape_configs:
  - job_name: dpi-engine
    static_configs:
      - targets: ["host.docker.internal:9101"]
    metrics_path: /metrics

  - job_name: control-plane
    static_configs:
      - targets: ["control-plane:8000"]
    metrics_path: /metrics

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /varz

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
