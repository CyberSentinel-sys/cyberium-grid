# OrHaShield NATS JetStream Configuration
# Version: 0.1.0

port: 4222
http_port: 8222
server_name: orhashield-nats

jetstream {
    store_dir: /data
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Structured logging.
logfile: /dev/stdout
log_time: true
debug: false

# Per-account permissions enforce NATS subject security.
# Each service has exactly the permissions it needs — nothing more.
accounts: {
    sensor_account: {
        users: [{ user: sensor, password: $NATS_SENSOR_PASS }]
        permissions: {
            publish: ["ot.events.>"]
            subscribe: []
        }
        jetstream: enabled
    }
    agent_account: {
        users: [{ user: agent, password: $NATS_AGENT_PASS }]
        permissions: {
            publish: ["ot.actions.proposed", "ot.audit"]
            subscribe: ["ot.events.>", "ot.alerts.>", "ot.actions.approved", "ot.actions.denied", "ot.actions.escalate"]
        }
        jetstream: enabled
    }
    gateway_account: {
        users: [{ user: gateway, password: $NATS_GATEWAY_PASS }]
        permissions: {
            publish: ["ot.actions.approved", "ot.actions.denied", "ot.actions.escalate", "ot.audit"]
            subscribe: ["ot.actions.proposed"]
        }
        jetstream: enabled
    }
    cp_account: {
        users: [{ user: cp, password: $NATS_CP_PASS }]
        permissions: {
            publish: ["ot.alerts.>"]
            subscribe: ["ot.events.>", "ot.alerts.>", "ot.actions.>", "ot.audit"]
        }
        jetstream: enabled
    }
}
