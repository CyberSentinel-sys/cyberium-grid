# OrHaShield SCADA Security Platform — Dev Compose
# Usage: docker compose -f infra/docker-compose.yml up -d
#
# Services:
#   Data layer:    postgres (TimescaleDB), clickhouse, neo4j, qdrant, nats
#   Platform:      dpi-engine, agent-orchestrator, safety-gate, control-plane
#   UI:            dashboard
#   Observability: prometheus, grafana

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

networks:
  ot_data:      # OT event bus + sensor traffic
    driver: bridge
  internal:     # Backend services (no external exposure)
    driver: bridge
  management:   # UI + observability
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  neo4j_data:
  qdrant_data:
  nats_data:
  prometheus_data:
  grafana_data:

# ── Data Layer ────────────────────────────────────────────────────────────────

services:

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: orhashield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orhashield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
      POSTGRES_DB: orhashield
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orhashield -d orhashield"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: orhashield-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: orhashield
      CLICKHOUSE_USER: orhashield
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme_dev}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/init/03_clickhouse_schema.sql:/docker-entrypoint-initdb.d/03_clickhouse_schema.sql:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    networks:
      - internal
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  neo4j:
    image: neo4j:5.18-community
    container_name: orhashield-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: orhashield-qdrant
    restart: unless-stopped
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # HTTP + gRPC
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  nats:
    image: nats:2.10-alpine
    container_name: orhashield-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      NATS_SENSOR_PASS: ${NATS_SENSOR_PASS:-sensor_dev_pass}
      NATS_AGENT_PASS: ${NATS_AGENT_PASS:-agent_dev_pass}
      NATS_GATEWAY_PASS: ${NATS_GATEWAY_PASS:-gateway_dev_pass}
      NATS_CP_PASS: ${NATS_CP_PASS:-cp_dev_pass}
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    networks:
      - ot_data
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

# ── Platform Services ─────────────────────────────────────────────────────────

  dpi-engine:
    build:
      context: ../sensors/dpi-engine
      dockerfile: Dockerfile
    container_name: orhashield-dpi-engine
    restart: unless-stopped
    network_mode: host          # Required for raw packet capture
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      NATS_URL: nats://sensor:${NATS_SENSOR_PASS:-sensor_dev_pass}@127.0.0.1:4222
      SENSOR_ID: ${SENSOR_ID:-sensor-01}
      INTERFACE: ${CAPTURE_INTERFACE:-eth0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PROMETHEUS_PORT: "9101"
    depends_on:
      nats:
        condition: service_healthy
    logging: *default-logging
    # NOTE: network_mode: host conflicts with networks: use host networking for packet capture.
    # The dpi-engine connects to NATS on 127.0.0.1 since host networking shares the host stack.

  agent-orchestrator:
    build:
      context: ../services/agent-orchestrator
      dockerfile: Dockerfile
    container_name: orhashield-agent-orchestrator
    restart: unless-stopped
    environment:
      NATS_URL: nats://agent:${NATS_AGENT_PASS:-agent_dev_pass}@nats:4222
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_DSN: postgresql+asyncpg://orhashield:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/orhashield
      QDRANT_URL: http://qdrant:6333
      TWIN_API_URL: ${TWIN_API_URL:-http://digital-twin:8001}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      ORHASHIELD_AUTONOMOUS_MODE: ${ORHASHIELD_AUTONOMOUS_MODE:-disabled}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - ot_data
      - internal
    logging: *default-logging

  safety-gate:
    build:
      context: ../services/safety-gate
      dockerfile: Dockerfile
    container_name: orhashield-safety-gate
    restart: unless-stopped
    environment:
      NATS_URL: nats://gateway:${NATS_GATEWAY_PASS:-gateway_dev_pass}@nats:4222
      POSTGRES_DSN: postgresql://orhashield:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/orhashield
      ORHASHIELD_AUTONOMOUS_MODE: ${ORHASHIELD_AUTONOMOUS_MODE:-disabled}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ot_data
      - internal
    logging: *default-logging

  control-plane:
    build:
      context: ../services/control-plane
      dockerfile: Dockerfile
    container_name: orhashield-control-plane
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+asyncpg://orhashield:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/orhashield
      NATS_URL: nats://cp:${NATS_CP_PASS:-cp_dev_pass}@nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      API_KEY: ${API_KEY:-dev_api_key_change_in_prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://dashboard:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - internal
      - management
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

# ── UI ────────────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ../ui/dashboard
      dockerfile: Dockerfile
    container_name: orhashield-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      control-plane:
        condition: service_healthy
    networks:
      - management
    logging: *default-logging

# ── Observability ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: orhashield-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal
      - management
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.2
    container_name: orhashield-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - management
    logging: *default-logging
