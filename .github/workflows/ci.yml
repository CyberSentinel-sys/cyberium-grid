name: OrHaShield CI

on:
  push:
    branches:
      - "claude/orhashield-scada-platform-5xTYX"
      - "main"
  pull_request:
    branches:
      - "main"

env:
  GO_VERSION: "1.23"
  RUST_VERSION: "1.80"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ── Linting ────────────────────────────────────────────────────────────────

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agent-orchestrator, control-plane]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - name: ruff check
        run: ruff check services/${{ matrix.service }}/src/
      - name: mypy strict
        run: |
          cd services/${{ matrix.service }}
          pip install -e ".[dev]" --quiet
          mypy --strict src/

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: sensors/dpi-engine

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/safety-gate
      - name: cargo fmt check
        run: cargo fmt --check
        working-directory: services/safety-gate
      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: services/safety-gate

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/dashboard/package-lock.json
      - run: npm ci
        working-directory: ui/dashboard
      - run: npm run lint
        working-directory: ui/dashboard
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: ui/dashboard

  # ── Testing ────────────────────────────────────────────────────────────────

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        service: [agent-orchestrator, control-plane]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: orhashield_test
          POSTGRES_USER: orhashield
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -e ".[dev]" --quiet
      - name: pytest with coverage
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -m "not slow" --cov=src --cov-report=term-missing --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://orhashield:testpassword@localhost:5432/orhashield_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ORHASHIELD_AUTONOMOUS_MODE: disabled

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go test with race detector
        run: go test ./... -race -count=1
        working-directory: sensors/dpi-engine
      - name: go benchmarks (smoke)
        run: go test ./... -bench=. -benchtime=1s -run='^$'
        working-directory: sensors/dpi-engine

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/safety-gate
      - name: cargo test (unit + property)
        run: cargo test --all-features
        working-directory: services/safety-gate
      - name: cargo test (doc tests)
        run: cargo test --doc
        working-directory: services/safety-gate

  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    needs: lint-typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/dashboard/package-lock.json
      - run: npm ci
        working-directory: ui/dashboard
      - run: npm test
        working-directory: ui/dashboard

  # ── Security ───────────────────────────────────────────────────────────────

  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: [test-python, test-go, test-rust]
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/golang
            p/rust
            p/owasp-top-ten
            p/injection
      - name: bandit (Python)
        run: |
          pip install bandit
          bandit -r services/agent-orchestrator/src services/control-plane/src -ll
      - name: gosec (Go)
        uses: securego/gosec@master
        with:
          args: ./sensors/dpi-engine/...
      - name: cargo-audit (Rust)
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: services/safety-gate
      - name: gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json

  # ── Build ──────────────────────────────────────────────────────────────────

  container-build:
    name: Build Containers
    runs-on: ubuntu-latest
    needs: sbom
    strategy:
      matrix:
        include:
          - context: sensors/dpi-engine
            image: dpi-engine
          - context: services/agent-orchestrator
            image: agent-orchestrator
          - context: services/safety-gate
            image: safety-gate
          - context: services/control-plane
            image: control-plane
          - context: ui/dashboard
            image: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ghcr.io/cybersentinel-sys/orhashield-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: container-build
    strategy:
      matrix:
        image: [dpi-engine, agent-orchestrator, safety-gate, control-plane, dashboard]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/cybersentinel-sys/orhashield-${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Integration (PR only) ──────────────────────────────────────────────────

  twin-integration:
    name: Digital Twin Integration
    runs-on: ubuntu-latest
    needs: container-build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Start infra stack
        run: docker compose -f infra/docker-compose.yml up -d
        env:
          POSTGRES_PASSWORD: testpassword
          JWT_SECRET_KEY: test-jwt-secret-not-for-production
          NATS_SENSOR_PASS: sensor
          NATS_AGENT_PASS: agent
          NATS_GATEWAY_PASS: gateway
          NATS_CP_PASS: cp
          NEO4J_PASSWORD: testpassword
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ORHASHIELD_AUTONOMOUS_MODE: disabled
      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8000/healthz; do sleep 2; done'
      - name: Run integration tests
        run: |
          pip install httpx pytest pytest-asyncio
          pytest tests/integration/ -v
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
